<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WPS 文档雷达 - Avast 推广演示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 模拟 Windows 桌面背景 */
        body {
            background-image: url('https://images.unsplash.com/photo-1617396900799-f4c92b21c471?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 弹窗进场动画 */
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .animate-slide-in {
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* 隐藏滚动条 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="w-screen h-screen relative">

    <!-- 全局模拟 Tooltip (避免被 overflow-hidden 裁剪) -->
    <div id="customTooltip" class="absolute z-50 px-2 py-1 bg-white border border-gray-200 text-gray-700 text-xs rounded shadow-md pointer-events-none transition-opacity duration-150 opacity-0 max-w-xs break-words" style="display: none;"></div>

    <!-- 模拟桌面任务栏 -->
    <div class="absolute bottom-0 w-full h-12 bg-black/60 backdrop-blur-md border-t border-white/10 flex items-center justify-center space-x-4">
        <div class="w-8 h-8 rounded bg-white/20 hover:bg-white/30 cursor-pointer"></div>
        <div class="w-8 h-8 rounded bg-white/20 hover:bg-white/30 cursor-pointer"></div>
        <div class="w-8 h-8 rounded bg-white/20 hover:bg-white/30 cursor-pointer"></div>
    </div>

    <!-- 模拟系统后台通知 Toast (演示静默安装完成) -->
    <div id="systemToast" class="absolute top-10 right-10 bg-white p-4 rounded shadow-xl flex items-center space-x-3 transition-all duration-500 transform translate-x-[150%] opacity-0">
        <div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center text-orange-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <div>
            <h4 class="text-sm font-bold text-gray-800">系统通知</h4>
            <p class="text-xs text-gray-500">Avast 杀毒软件已在后台成功安装。</p>
        </div>
    </div>

    <!-- 文档雷达主弹窗 -->
    <div id="radarPopup" class="absolute bottom-16 right-6 w-[380px] bg-white rounded-xl shadow-2xl flex flex-col overflow-visible animate-slide-in">
        
        <!-- 上半部分：雷达基础区域 -->
        <div class="p-4 flex flex-col">
            <!-- Header -->
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center space-x-2 text-red-500 font-bold text-sm">
                    <!-- WPS Logo Mock -->
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M4.5 5.5l3.5 11h3l2.5-8 2.5 8h3l3.5-11h-2.5l-2 7.5-2.5-7.5h-2.5l-2.5 7.5-2-7.5h-2.5z"/>
                    </svg>
                    <span class="text-gray-700">WPS Office</span>
                </div>
                <div class="flex items-center space-x-3 text-gray-400">
                    <button class="hover:text-gray-600 transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg></button>
                    <button id="closeMainBtn" class="hover:text-gray-600 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                </div>
            </div>

            <!-- Title -->
            <h2 class="text-sm font-bold text-gray-800 mb-3">发现新的下载文件</h2>

            <!-- File List (修复误导：雷达仅捕获办公文档) -->
            <div class="space-y-3 mb-5 max-h-32 overflow-y-auto no-scrollbar">
                <div class="flex items-center space-x-3 text-sm">
                    <div class="w-6 h-6 bg-red-100 text-red-500 rounded flex items-center justify-center font-bold text-xs">PDF</div>
                    <span class="text-gray-700 truncate w-48">2026_Global_Market_Report.pdf</span>
                </div>
                <div class="flex items-center space-x-3 text-sm">
                    <div class="w-6 h-6 bg-blue-500 text-white rounded flex items-center justify-center font-bold text-xs">W</div>
                    <span class="text-gray-700 truncate w-48">产品需求文档PRD.docx</span>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex space-x-2">
                <button class="flex-1 bg-blue-600 hover:bg-blue-700 text-white text-sm py-1.5 rounded transition">打开文件</button>
                <button class="flex-1 border border-gray-300 hover:bg-gray-50 text-gray-700 text-sm py-1.5 rounded transition">上传到云盘</button>
            </div>
        </div>

        <!-- 下半部分：运营横条 (Avast) -->
        <div id="promoBanner" class="bg-gray-50 border-t border-gray-100 p-2.5 flex items-center justify-between rounded-b-xl relative group">
            
            <!-- 左侧内容区：Icon + 文案 (包含防截断Tooltip测试) -->
            <div class="flex items-center space-x-2 overflow-hidden flex-1 pr-2">
                <!-- Avast 模拟 Icon (橘色盾牌) -->
                <div class="flex-shrink-0 w-5 h-5 text-orange-500">
                    <svg fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" opacity="0.2"/>
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10zm0-18l6 2.2v5.8c0 4.6-4.5 7.6-6 8.5-1.5-.9-6-3.9-6-8.5V7.2l6-2.2z"/>
                    </svg>
                </div>
                <!-- 长文案演示截断和Tooltip -->
                <div class="text-xs text-gray-700 truncate cursor-default" data-tooltip="File Safe | Powered by Avast">
                    File Safe | Powered by Avast
                </div>
            </div>

            <!-- 右侧交互区：主按钮 + 关闭按钮 -->
            <div class="flex items-center space-x-1 flex-shrink-0">
                <!-- 状态机按钮 -->
                <button id="installBtn" class="bg-blue-50 text-blue-600 border border-blue-200 hover:bg-blue-100 px-3 py-1 rounded text-xs font-medium transition-colors w-24 flex justify-center items-center">
                    <span>Protect PC</span>
                </button>
                
                <!-- Hover出现的关闭小按钮 -->
                <button id="closeBannerBtn" class="w-5 h-5 rounded-full hover:bg-gray-200 text-gray-400 hover:text-gray-600 flex items-center justify-center transition opacity-0 group-hover:opacity-100 relative" data-tooltip="关闭提示">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
        </div>

    </div>

    <script>
        const installBtn = document.getElementById('installBtn');
        const closeBannerBtn = document.getElementById('closeBannerBtn');
        const closeMainBtn = document.getElementById('closeMainBtn');
        const promoBanner = document.getElementById('promoBanner');
        const radarPopup = document.getElementById('radarPopup');
        const systemToast = document.getElementById('systemToast');
        const customTooltip = document.getElementById('customTooltip');

        // 全局 Tooltip 交互逻辑
        const tooltipElements = document.querySelectorAll('[data-tooltip]');
        tooltipElements.forEach(el => {
            el.addEventListener('mouseenter', () => {
                customTooltip.textContent = el.getAttribute('data-tooltip');
                customTooltip.style.display = 'block';
                // 极短延迟后显示透明度动画
                setTimeout(() => customTooltip.classList.remove('opacity-0'), 10);
            });
            el.addEventListener('mousemove', (e) => {
                // Tooltip 跟随鼠标，稍微偏移防止遮挡指针
                customTooltip.style.left = (e.pageX + 12) + 'px';
                customTooltip.style.top = (e.pageY + 16) + 'px';
            });
            el.addEventListener('mouseleave', () => {
                customTooltip.classList.add('opacity-0');
                // 等待动画结束后隐藏
                setTimeout(() => customTooltip.style.display = 'none', 150);
            });
        });

        let isInstalling = false;

        // 交互：点击“免费获取”
        installBtn.addEventListener('click', () => {
            if(isInstalling) return; // 防连点
            isInstalling = true;

            // 1. 改变按钮UI状态：变更为“安装中”与不可点击的样式
            installBtn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-1 h-3 w-3 text-gray-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Installing...
            `;
            installBtn.className = "bg-gray-100 text-gray-500 border border-gray-200 px-3 py-1 rounded text-xs font-medium cursor-not-allowed w-24 flex justify-center items-center";

            // 2. 模拟后台静默安装任务 (PRD: 用户关闭弹窗不影响安装进程)
            // 设定 4 秒后安装完成
            setTimeout(() => {
                // 模拟安装完成，弹出系统Toast
                systemToast.classList.remove('translate-x-[150%]', 'opacity-0');
                systemToast.classList.add('translate-x-0', 'opacity-100');

                // 如果此时主弹窗还没关，可以恢复或隐藏横条（此处演示保持原样，仅出系统通知）
                if(!radarPopup.classList.contains('hidden')){
                    installBtn.innerHTML = 'Installed';
                }

                // 3秒后系统通知消失
                setTimeout(() => {
                    systemToast.classList.add('translate-x-[150%]', 'opacity-0');
                    systemToast.classList.remove('translate-x-0', 'opacity-100');
                }, 3000);

            }, 4000);
        });

        // 交互：点击横条的“X” (仅关闭横条)
        closeBannerBtn.addEventListener('click', () => {
            promoBanner.style.display = 'none';
            // 修复圆角：若底部消失，上半部分需要补全下方的圆角
            radarPopup.firstElementChild.classList.add('rounded-b-xl');
        });

        // 交互：点击主弹窗的“X” (关闭整个雷达)
        closeMainBtn.addEventListener('click', () => {
            radarPopup.style.display = 'none';
        });

    </script>
</body>
</html>
