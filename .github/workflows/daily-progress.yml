name: WPS daily progress

on:
  schedule:
    # 10:00 Beijing time (02:00 UTC), Monday through Friday.
    - cron: '0 2 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-daily-progress:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Send WPS daily progress card
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          WPS_WEBHOOK_URL: ${{ secrets.WPS_WEBHOOK_URL }}
          WPS_WEBHOOK_KEY: ${{ secrets.WPS_WEBHOOK_KEY }}
          WPS_WEBHOOK_SECRET: ${{ secrets.WPS_WEBHOOK_SECRET }}
        run: python scripts/send_daily_progress.py
